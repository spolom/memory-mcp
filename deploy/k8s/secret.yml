# GitHub token Secret template.
#
# Option A (recommended): run "auth login" as a one-off Job using the
# memory-mcp-bootstrap ServiceAccount (see rbac.yml), or from a host with
# kubeconfig access to secrets in the memory-mcp namespace:
#
#   memory-mcp auth login --store k8s-secret \
#     --k8s-namespace memory-mcp \
#     --k8s-secret-name memory-mcp-github-token
#
# Option B: apply this manifest after filling in the token value.
# Replace <BASE64_ENCODED_TOKEN> with: echo -n "ghp_..." | base64
#
# Do NOT commit this file with a real token. Consider using Sealed Secrets,
# External Secrets Operator, or a secrets manager instead.
apiVersion: v1
kind: Secret
metadata:
  name: memory-mcp-github-token
  namespace: memory-mcp
type: Opaque
data:
  # base64-encoded GitHub personal access token (classic) with repo scope.
  token: <BASE64_ENCODED_TOKEN>
