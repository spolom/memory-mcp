# Detect version bumps on main and create a git tag.
# The tag push triggers release.yml, which builds binaries with
# taiki-e/upload-rust-binary-action and publishes artifacts.
#
# Triggered by workflow_run so that:
#   1. The tag is only created after CI passes (explicit gate, not polling)
#   2. The dependency is visible in GitHub's workflow visualization UI
name: Tag Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Only one tag-release at a time.
concurrency:
  group: tag-release
  cancel-in-progress: false

permissions: {}

jobs:
  tag-release:
    # Only run when CI succeeded, not on failure/cancellation.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Use the release-manager GitHub App so that the tag push triggers
      # downstream workflows (release.yml). The default GITHUB_TOKEN
      # doesn't trigger workflows due to the anti-cascade rule.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # Use the CI run's commit, not the latest on the branch — avoids
          # a race where a newer push lands between CI completing and this
          # workflow starting.
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Check for version bump
        id: check
        run: |
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$version" ]; then
            echo "::error::Failed to extract version from Cargo.toml"
            exit 1
          fi
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag}" >> "$GITHUB_OUTPUT"

          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists — no release needed"
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version ${version} detected"
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.release == 'true'
        env:
          TAG_NAME: ${{ steps.check.outputs.tag_name }}
        run: |
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Summary
        if: steps.check.outputs.release == 'true'
        env:
          TAG_NAME: ${{ steps.check.outputs.tag_name }}
        run: |
          echo "### Release ${TAG_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag created and pushed. Release workflow will handle the rest." >> "$GITHUB_STEP_SUMMARY"
