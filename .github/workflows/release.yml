name: Release

on:
  push:
    branches: [main]

# Must queue, not cancel — cancelling mid-run can corrupt the release-please manifest.
concurrency:
  group: release-please
  cancel-in-progress: false

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE: butterflyskies/memory-mcp

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build and push a semver-tagged container image when a release is published.
  #
  # This runs in the same workflow as release-please because GITHUB_TOKEN events
  # don't trigger other workflows (anti-cascade rule). We wait for the CI workflow
  # to pass on the same commit before publishing — CI triggers from the same push
  # event but runs independently.
  publish-image:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Wait for CI to pass
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for CI workflow on ${{ github.sha }}..."
          for attempt in $(seq 1 20); do
            run_id=$(gh run list --repo "${{ github.repository }}" --workflow=build.yml \
              --commit="${{ github.sha }}" --limit=1 --json databaseId -q '.[0].databaseId')
            [ -n "$run_id" ] && break
            echo "CI run not found yet, retrying in 30s (attempt $attempt/20)..."
            sleep 30
          done
          if [ -z "$run_id" ]; then
            echo "::error::CI run not found for ${{ github.sha }} after 10 minutes"
            exit 1
          fi
          echo "Found CI run $run_id, waiting for completion..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status > /dev/null
          echo "CI run $run_id passed."
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
