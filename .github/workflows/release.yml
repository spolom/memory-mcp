name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

# Must queue, not cancel — cancelling mid-run can corrupt the release-please manifest.
concurrency:
  group: release-please
  cancel-in-progress: false

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE: butterflyskies/memory-mcp

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # Generate a token from the release-manager GitHub App so that PRs
      # created by release-please trigger CI workflows. The default
      # GITHUB_TOKEN doesn't trigger workflows (anti-cascade rule).
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
      - id: release
        uses: googleapis/release-please-action@8bb7a2ed0f90c9802c83129a9488d235a1f31a7c # main (2026-02-20, includes release-please 17.3.0 with force-tag-creation)
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

  # All publish jobs share this CI gate. It waits for the CI workflow (triggered
  # by the same push event) to pass before allowing any artifacts to ship.
  ci-gate:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Wait for CI to pass
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for CI workflow on ${{ github.sha }}..."
          for attempt in $(seq 1 20); do
            run_id=$(gh run list --repo "${{ github.repository }}" --workflow=build.yml \
              --event=push --commit="${{ github.sha }}" --limit=1 --json databaseId -q '.[0].databaseId')
            [ -n "$run_id" ] && break
            echo "CI run not found yet, retrying in 30s (attempt $attempt/20)..."
            sleep 30
          done
          if [ -z "$run_id" ]; then
            echo "::error::CI run not found for ${{ github.sha }} after 10 minutes"
            exit 1
          fi
          echo "Found CI run $run_id, waiting for completion..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status > /dev/null
          echo "CI run $run_id passed."

  # Build and push a semver-tagged container image.
  #
  # This runs in the same workflow as release-please because GITHUB_TOKEN events
  # don't trigger other workflows (anti-cascade rule).
  publish-image:
    needs: [release-please, ci-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build release binaries and upload them as GitHub release assets.
  # All binaries include the k8s feature (opt-in at runtime via --store k8s-secret).
  publish-binaries:
    needs: [release-please, ci-gate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            build-tool: cargo
          # Windows excluded until usearch supports it (see #42).
          - target: universal-apple-darwin
            os: macos-latest
            build-tool: cargo
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Install system dependencies
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master (2026-02-13)
        with:
          toolchain: stable
      - uses: taiki-e/upload-rust-binary-action@0e34102c043ded9f2ca39f7af5cd99a540c61aff # v1.29.1
        with:
          bin: memory-mcp
          target: ${{ matrix.target }}
          build-tool: ${{ matrix.build-tool }}
          features: k8s
          archive: memory-mcp-$tag-$target
          tar: all
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: refs/tags/${{ needs.release-please.outputs.tag_name }}

  # Publish to crates.io using Trusted Publishing (OIDC — no API token needed).
  # Requires the "release" environment configured in GitHub repo settings and
  # a Trusted Publisher entry in crates.io linking this repo + workflow.
  publish-crate:
    needs: [release-please, ci-gate]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master (2026-02-13)
        with:
          toolchain: stable
      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1.0.3
        id: auth
      - name: Publish crate
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Undraft the release after all artifacts (image + binaries + crate) are uploaded.
  # release-please creates a draft so that immutable-release rules don't block
  # asset uploads; this job flips the draft flag once everything is in place.
  publish-release:
    needs: [release-please, publish-image, publish-binaries, publish-crate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ needs.release-please.outputs.tag_name }}" \
            --draft=false \
            --repo "${{ github.repository }}"
